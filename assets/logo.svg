<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Deerstalker hat (Sherlock Holmes style) -->
  <!-- Main hat body -->
  <path d="M58 82 Q60 55 100 50 Q140 55 142 82" fill="#3f3f46"/>
  <!-- Hat brim front -->
  <path d="M50 82 Q55 78 75 80 Q90 82 100 85 Q110 82 125 80 Q145 78 150 82 Q148 90 125 88 Q110 86 100 88 Q90 86 75 88 Q52 90 50 82Z" fill="#52525b"/>
  <!-- Hat brim back (flipped up) -->
  <path d="M58 82 Q62 72 78 74 Q85 75 90 78" fill="#52525b" opacity="0.6"/>
  <path d="M142 82 Q138 72 122 74 Q115 75 110 78" fill="#52525b" opacity="0.6"/>
  <!-- Hat band -->
  <rect x="62" y="76" width="76" height="4" rx="2" fill="#0d9488"/>
  <!-- Hat top detail -->
  <path d="M70 60 Q85 48 100 50 Q115 48 130 60" fill="none" stroke="#52525b" stroke-width="1"/>

  <!-- Face silhouette -->
  <ellipse cx="100" cy="105" rx="30" ry="25" fill="#d4d4d8"/>
  <!-- Eyes -->
  <circle cx="88" cy="100" r="3" fill="#262626"/>
  <circle cx="112" cy="100" r="3" fill="#262626"/>
  <!-- Eyebrow raised (investigating look) -->
  <path d="M82 94 Q88 90 94 93" fill="none" stroke="#262626" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M106 93 Q112 90 118 94" fill="none" stroke="#262626" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M100 103 Q97 108 99 110 Q100 111 101 110 Q103 108 100 103" fill="#a1a1aa"/>
  <!-- Slight smirk -->
  <path d="M90 115 Q95 119 100 118 Q105 119 110 115" fill="none" stroke="#262626" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Magnifying glass (held to the side) -->
  <circle cx="155" cy="130" r="22" fill="none" stroke="#0d9488" stroke-width="4"/>
  <circle cx="155" cy="130" r="18" fill="#f0fdfa" opacity="0.3"/>
  <!-- Glass handle -->
  <line x1="140" y1="148" x2="122" y2="170" stroke="#0d9488" stroke-width="5" stroke-linecap="round"/>

  <!-- Binary/data inside the magnifying glass -->
  <text x="143" y="125" font-family="monospace" font-size="7" fill="#0d9488" opacity="0.7">011</text>
  <text x="143" y="133" font-family="monospace" font-size="7" fill="#0d9488" opacity="0.7">100</text>
  <text x="143" y="141" font-family="monospace" font-size="7" fill="#ef4444" font-weight="bold">ERR</text>

  <!-- Coat collar / scarf hint -->
  <path d="M72 125 Q80 135 85 140 Q90 142 95 140" fill="none" stroke="#52525b" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M128 125 Q120 135 115 140 Q110 142 105 140" fill="none" stroke="#52525b" stroke-width="2.5" stroke-linecap="round"/>
</svg>
