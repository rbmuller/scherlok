name: Docker

# Builds the scherlok container image and publishes it to GitHub Container
# Registry (ghcr.io/rbmuller/scherlok) on every release tag, mirroring the
# trigger of release.yml so PyPI and GHCR ship together.
#
# Per-PR / per-push validation lives in ci.yml. This workflow is gated on
# tags so non-release branches do not block on a Docker build.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

# Catch dependency bloat early: if a new transitive dep silently doubles the
# image, fail the publish before a release tag goes out. v0.7.0 added the
# `mcp` core dep (pydantic, anyio, httpx, starlette, uvicorn family) which
# lifts the baseline ~5-10 MiB above v0.6.0's 85-95 MiB; the cap was bumped
# to 130 MiB to keep the same "small headroom" framing without false-failing
# the legitimate growth.
env:
  MAX_IMAGE_SIZE_BYTES: 136314880

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # push to ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/rbmuller/scherlok:${{ steps.tags.outputs.version }}
            ghcr.io/rbmuller/scherlok:latest
          labels: |
            org.opencontainers.image.source=https://github.com/rbmuller/scherlok
            org.opencontainers.image.description=Scherlok data anomaly detection CLI
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.tags.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Assert image size under ceiling (linux/amd64)
        env:
          IMAGE_REF: ghcr.io/rbmuller/scherlok:${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail
          digest=$(docker buildx imagetools inspect "$IMAGE_REF" --raw \
            | jq -r '.manifests[] | select(.platform.architecture == "amd64" and .platform.os == "linux") | .digest')
          if [ -z "$digest" ] || [ "$digest" = "null" ]; then
            echo "::error::Could not resolve linux/amd64 manifest for $IMAGE_REF"
            exit 1
          fi
          repo="${IMAGE_REF%:*}"
          size_bytes=$(docker buildx imagetools inspect "${repo}@${digest}" --raw \
            | jq '[.layers[].size] | add')
          size_mib=$(( size_bytes / 1024 / 1024 ))
          max_mib=$(( MAX_IMAGE_SIZE_BYTES / 1024 / 1024 ))
          echo "linux/amd64 compressed image size: ${size_mib} MiB (ceiling ${max_mib} MiB)"
          if [ "$size_bytes" -gt "$MAX_IMAGE_SIZE_BYTES" ]; then
            echo "::error::Image size ${size_mib} MiB exceeds the ${max_mib} MiB ceiling. Investigate dependency bloat before merging."
            exit 1
          fi

      - name: Smoke-test image
        run: |
          docker run --rm \
            "ghcr.io/rbmuller/scherlok:${{ steps.tags.outputs.version }}" \
            version
